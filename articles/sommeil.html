<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimiser son sommeil - FlowPerso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;background:#f9f9f9;color:#222;line-height:1.7}a{text-decoration:none;color:inherit}
header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:white;padding:0 30px;position:sticky;top:0;z-index:999;display:flex;align-items:center;justify-content:space-between;height:65px;box-shadow:0 3px 20px rgba(0,0,0,0.4)}
.logo{font-size:1.8em;font-weight:900;color:#e94560;letter-spacing:-1px}.logo span{color:white}
nav a{color:#ccc;font-weight:600;font-size:.95em;padding:8px 16px;border-radius:20px;margin-left:10px;transition:.3s}nav a:hover{background:#e94560;color:white}
.article-hero{background:linear-gradient(135deg,#f093fb,#f5576c);color:white;padding:80px 30px;text-align:center}
.article-hero .tag{background:rgba(255,255,255,.25);padding:6px 18px;border-radius:20px;font-size:.85em;font-weight:700;display:inline-block;margin-bottom:20px}
.article-hero h1{font-size:2.8em;font-weight:900;max-width:800px;margin:0 auto 20px;line-height:1.2}
.article-hero .meta{opacity:.85;font-size:1em}
.container{max-width:800px;margin:0 auto;padding:0 25px}
.article-body{padding:60px 0}
.article-body h2{font-size:1.9em;font-weight:900;color:#1a1a2e;margin:45px 0 15px;border-left:5px solid #e94560;padding-left:20px}
.article-body h3{font-size:1.4em;font-weight:700;color:#0f3460;margin:30px 0 10px}
.article-body p{color:#444;font-size:1.05em;line-height:1.85;margin-bottom:20px}
.article-body ul{margin:15px 0 25px 25px}.article-body ul li{color:#444;font-size:1.05em;line-height:1.8;margin-bottom:10px}
.highlight{background:linear-gradient(135deg,#fce4f3,#f5c6ea);border-left:4px solid #f093fb;padding:22px 28px;border-radius:0 15px 15px 0;margin:30px 0;font-style:italic;color:#555}
.ad-banner{background:#f0f2f5;border:2px dashed #ccc;border-radius:12px;padding:25px;text-align:center;margin:35px 0;color:#aaa;font-size:.85em}
.ad-banner strong{display:block;font-size:1em;color:#bbb;margin-bottom:4px}
.related{background:#1a1a2e;padding:60px 0;color:white}
.related-title{text-align:center;font-size:1.8em;font-weight:900;margin-bottom:35px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:0 25px}
.related-card{background:rgba(255,255,255,.08);border-radius:15px;padding:25px;border:1px solid rgba(255,255,255,.1);transition:.3s}
.related-card:hover{background:rgba(233,69,96,.2);border-color:#e94560}
.related-card h4{font-weight:800;margin-bottom:8px}.related-card p{color:#aac4e6;font-size:.88em;line-height:1.5}
.related-card a{color:#e94560;font-weight:700;font-size:.88em;display:inline-block;margin-top:8px}
footer{background:#111;color:#aaa;text-align:center;padding:30px;font-size:.9em}footer a{color:#e94560}
</style>
</head>
<body>
<header>
