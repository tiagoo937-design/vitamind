<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowPerso - Bien-etre et Developpement Personnel</title>
<meta name="description" content="FlowPerso : conseils, articles et methodes bases sur la science pour mieux dormir, etre plus productif et s'epanouir au quotidien.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f9f9f9;color:#222;line-height:1.7}
a{text-decoration:none;color:inherit}
header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:white;padding:0 30px;position:sticky;top:0;z-index:999;display:flex;align-items:center;justify-content:space-between;height:65px;box-shadow:0 3px 20px rgba(0,0,0,0.4)}
.logo{font-size:1.8em;font-weight:900;color:#e94560;letter-spacing:-1px}
.logo span{color:white}
nav a{color:#ccc;font-weight:600;font-size:.95em;transition:.3s;padding:8px 16px;border-radius:20px;margin-left:10px}
nav a:hover{background:#e94560;color:white}
.hero{background:linear-gradient(135deg,#0f3460,#16213e,#1a1a2e);color:white;padding:100px 30px 130px;text-align:center;position:relative}
.hero::after{content:'';position:absolute;bottom:-50px;left:0;right:0;height:100px;background:#f9f9f9;border-radius:50%}
.hero h1{font-size:3.2em;font-weight:900;line-height:1.2;margin-bottom:20px}
.hero h1 span{color:#e94560}
.hero p{font-size:1.2em;color:#aac4e6;max-width:700px;margin:0 auto 35px}
.cta-btn{background:linear-gradient(135deg,#e94560,#c0392b);color:white;padding:16px 45px;border-radius:50px;font-size:1.1em;font-weight:700;display:inline-block;box-shadow:0 8px 25px rgba(233,69,96,0.4);transition:.3s}
.cta-btn:hover{transform:translateY(-3px)}
.container{max-width:1100px;margin:0 auto;padding:0 25px}
.section{padding:70px 0}
.section-title{font-size:2.2em;font-weight:900;color:#1a1a2e;text-align:center;margin-bottom:12px}
.section-sub{text-align:center;color:#777;font-size:1.05em;margin-bottom:45px;max-width:650px;margin-left:auto;margin-right:auto}
.about-bar{background:white;padding:50px 0;border-bottom:1px solid #eee}
.about-inner{display:flex;align-items:center;gap:40px;max-width:900px;margin:0 auto;padding:0 25px}
.about-avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#e94560,#c0392b);display:flex;align-items:center;justify-content:center;font-size:2.5em;flex-shrink:0}
.about-text h3{font-size:1.3em;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.about-text p{color:#555;font-size:.97em;line-height:1.7}
.ad-banner{background:#f0f2f5;border:2px dashed #ccc;border-radius:12px;padding:25px;text-align:center;margin:35px 0;color:#aaa;font-size:.85em}
.ad-banner strong{display:block;font-size:1em;color:#bbb;margin-bottom:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:28px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.07);transition:.3s}
